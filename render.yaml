# Render Blueprint — one web service running the Dockerized app.
# Deploy: push to GitHub, then in Render: New + > Blueprint, pick this repo.
services:
  - type: web
    name: cherion
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Set the secret value in the Render dashboard (sync:false = not in git).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CHERION_MODEL
        value: claude-sonnet-4-6
