<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cherion — Clinical Trial Visualizer</title>
  <!-- Renderers: a generic spec-driven renderer proving the schema is self-describing -->
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { --bg:#0f1419; --panel:#1a212b; --line:#2a3441; --fg:#e6edf3; --muted:#8b98a5; --accent:#4493f8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:20px 28px; border-bottom:1px solid var(--line); }
    h1 { margin:0; font-size:20px; } .sub { color:var(--muted); font-size:13px; margin-top:4px; }
    main { max-width:1100px; margin:0 auto; padding:24px 28px; }
    .bar { display:flex; gap:8px; }
    input[type=text] { flex:1; padding:12px 14px; background:var(--panel); border:1px solid var(--line); border-radius:8px; color:var(--fg); font-size:15px; }
    button { padding:12px 20px; background:var(--accent); color:#fff; border:0; border-radius:8px; font-size:15px; cursor:pointer; }
    button:disabled { opacity:.5; cursor:wait; }
    .examples { margin-top:10px; display:flex; flex-wrap:wrap; gap:6px; }
    .chip { font-size:12px; color:var(--accent); background:rgba(68,147,248,.1); border:1px solid var(--line); border-radius:14px; padding:4px 10px; cursor:pointer; }
    .card { margin-top:22px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:20px; }
    .title { font-size:17px; font-weight:600; margin:0 0 4px; }
    .meta { color:var(--muted); font-size:12.5px; margin-bottom:14px; }
    .warn { color:#f0b429; font-size:12.5px; margin:6px 0; }
    #viz { min-height:360px; }
    #map { height:440px; border-radius:8px; }
    #net { height:480px; border:1px solid var(--line); border-radius:8px; background:#0c1117; }
    table { border-collapse:collapse; width:100%; font-size:12.5px; margin-top:10px; }
    th,td { border-bottom:1px solid var(--line); padding:6px 8px; text-align:left; }
    th { color:var(--muted); font-weight:500; }
    a { color:var(--accent); }
    details { margin-top:14px; } summary { cursor:pointer; color:var(--muted); font-size:13px; }
    pre { background:#0c1117; padding:14px; border-radius:8px; overflow:auto; font-size:11.5px; }
  </style>
</head>
<body>
  <header>
    <h1>Cherion</h1>
    <div class="sub">Ask a clinical-trials question → get a cited visualization. Data: ClinicalTrials.gov</div>
  </header>
  <main>
    <div class="bar">
      <input id="q" type="text" placeholder="e.g. Trials by phase for pembrolizumab" />
      <button id="go">Visualize</button>
    </div>
    <div class="examples" id="examples"></div>
    <div id="out"></div>
  </main>

<script>
const API = location.origin.includes("http") ? "" : "http://localhost:8000";
const EXAMPLES = [
  "Trials by phase for pembrolizumab",
  "Number of diabetes trials started each year since 2015",
  "Distribution of enrollment size for recruiting lung cancer trials",
  "Network of drugs and conditions for CAR-T trials",
  "Where are recruiting Alzheimer's trials located by country",
  "Compare trials by phase and status for breast cancer",
];
const exEl = document.getElementById("examples");
EXAMPLES.forEach(t => {
  const c = document.createElement("span"); c.className = "chip"; c.textContent = t;
  c.onclick = () => { document.getElementById("q").value = t; run(); };
  exEl.appendChild(c);
});

document.getElementById("go").onclick = run;
document.getElementById("q").addEventListener("keydown", e => { if (e.key === "Enter") run(); });

async function run() {
  const query = document.getElementById("q").value.trim();
  if (!query) return;
  const btn = document.getElementById("go"); btn.disabled = true; btn.textContent = "Loading…";
  const out = document.getElementById("out");
  out.innerHTML = '<div class="card">Querying ClinicalTrials.gov…</div>';
  try {
    const r = await fetch(API + "/visualize", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ query, max_records: 300 })
    });
    if (!r.ok) throw new Error(await r.text());
    render(await r.json());
  } catch (e) {
    out.innerHTML = '<div class="card warn">Error: ' + e.message + '</div>';
  } finally { btn.disabled = false; btn.textContent = "Visualize"; }
}

function render(resp) {
  const v = resp.visualization, m = resp.meta;
  const out = document.getElementById("out");
  out.innerHTML = "";
  const card = document.createElement("div"); card.className = "card";
  card.innerHTML = `<div class="title">${v.title}</div>
    <div class="meta">Interpreted as: ${m.query_interpretation || "—"} ·
    aggregated ${m.trials_aggregated} of ${m.total_matching_trials ?? "?"} trials · source: ${m.source}</div>`;
  (m.warnings || []).forEach(w => { const d = document.createElement("div"); d.className="warn"; d.textContent="⚠ "+w; card.appendChild(d); });

  const host = document.createElement("div"); host.id = "viz"; card.appendChild(host);
  out.appendChild(card);

  // Spec-driven dispatch: the renderer reads v.type + v.encoding, never hardcoding fields.
  const R = { bar_chart:vlBar, grouped_bar:vlGroupedBar, time_series:vlLine,
              histogram:vlHistogram, scatter_plot:vlScatter,
              network_graph:netGraph, geo_map:geoMap };
  (R[v.type] || (()=>host.textContent="Unsupported type "+v.type))(v, host);

  // raw JSON + citations
  const det = document.createElement("details");
  det.innerHTML = "<summary>Raw response (schema)</summary><pre>"+
    JSON.stringify(resp,null,2).replace(/</g,"&lt;")+"</pre>";
  card.appendChild(det);
}

function vlEmbed(host, spec) { vegaEmbed(host, spec, {actions:false, theme:"dark"}); }
function ch(c){ return c ? c.title || c.field : ""; }

function vlBar(v, host) {
  const e = v.encoding;
  vlEmbed(host, { data:{values:v.data}, mark:"bar", width:"container", height:340,
    encoding:{ x:{field:e.x.field, type:e.x.type, title:ch(e.x), sort:"-y"},
               y:{field:e.y.field, type:e.y.type, title:ch(e.y)},
               tooltip:[{field:e.x.field},{field:e.y.field}] }});
}
function vlGroupedBar(v, host) {
  const e = v.encoding;
  vlEmbed(host, { data:{values:v.data}, mark:"bar", width:"container", height:340,
    encoding:{ x:{field:e.x.field, type:"nominal", title:ch(e.x)},
               y:{field:e.y.field, type:"quantitative", title:ch(e.y)},
               color:{field:e.color.field, type:"nominal", title:ch(e.color)},
               xOffset:{field:e.color.field} }});
}
function vlLine(v, host) {
  const e = v.encoding;
  vlEmbed(host, { data:{values:v.data}, mark:{type:"line", point:true}, width:"container", height:340,
    encoding:{ x:{field:e.x.field, type:"ordinal", title:ch(e.x)},
               y:{field:e.y.field, type:"quantitative", title:ch(e.y)} }});
}
function vlHistogram(v, host) {
  const e = v.encoding;
  vlEmbed(host, { data:{values:v.data}, mark:"bar", width:"container", height:340,
    encoding:{ x:{field:"bin_label", type:"ordinal", title:ch(e.x), sort:null},
               y:{field:e.y.field, type:"quantitative", title:ch(e.y)} }});
}
function vlScatter(v, host) {
  const e = v.encoding;
  vlEmbed(host, { data:{values:v.data}, mark:"point", width:"container", height:340,
    encoding:{ x:{field:e.x.field, type:"quantitative", title:ch(e.x)},
               y:{field:e.y.field, type:"quantitative", title:ch(e.y)},
               tooltip:[{field:"nct_id"},{field:e.x.field},{field:e.y.field}] }});
}
function netGraph(v, host) {
  host.innerHTML = '<div id="net"></div>';
  const colors = {drug:"#4493f8", condition:"#3fb950", sponsor:"#db61a2", site:"#f0b429"};
  const nodes = v.data.nodes.map(n => ({ id:n.id, label:n.label, group:n.group,
    value:n.weight, color:colors[n.group]||"#888",
    title:`${n.group}: ${n.label} (${n.weight} trials)` }));
  const edges = v.data.edges.map(e => ({ from:e.source, to:e.target, value:e.weight,
    title:`${e.weight} shared trials` }));
  new vis.Network(document.getElementById("net"), {nodes, edges}, {
    nodes:{shape:"dot", font:{color:"#e6edf3"}},
    edges:{color:{color:"#39414d"}, smooth:false},
    physics:{stabilization:true, barnesHut:{springLength:140}} });
}
function geoMap(v, host) {
  host.innerHTML = '<div id="map"></div>';
  const map = L.map("map").setView([20,0], 2);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",
    {attribution:"© OpenStreetMap, © CARTO"}).addTo(map);
  const pts = v.data.points || [];
  const max = Math.max(1, ...pts.map(p=>p.trial_count));
  pts.forEach(p => {
    L.circleMarker([p.lat, p.lng], { radius: 4 + 10*(p.trial_count/max),
      color:"#4493f8", fillColor:"#4493f8", fillOpacity:.5, weight:1 })
      .bindPopup(`<b>${p.label||"site"}</b><br>${p.trial_count} trial(s)`).addTo(map);
  });
  // region table beneath the map (choropleth-ready data)
  const t = document.createElement("table");
  t.innerHTML = "<tr><th>Country</th><th>Trials</th><th>Example NCT</th></tr>" +
    (v.data.regions||[]).slice(0,15).map(r =>
      `<tr><td>${r.region}</td><td>${r.trial_count}</td><td>`+
      `<a href="https://clinicaltrials.gov/study/${r.references[0]?.nct_id}" target="_blank">`+
      `${r.references[0]?.nct_id||""}</a></td></tr>`).join("");
  host.appendChild(t);
}
</script>
</body>
</html>
